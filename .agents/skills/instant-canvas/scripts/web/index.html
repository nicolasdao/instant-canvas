<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>InstantCanvas</title>
<link rel="stylesheet" href="/assets/vendor/plotly.css?token=__IC_TOKEN__" />
<link rel="stylesheet" href="/assets/styles.css?token=__IC_TOKEN__" />
</head>
<body>
<div class="app">
	<div class="topbar">
		<div class="brand"><svg class="logo" viewBox="0 0 100 100" aria-hidden="true"><defs><clipPath id="ic-logo-clip"><rect width="100" height="100" rx="12"/></clipPath></defs><g clip-path="url(#ic-logo-clip)"><rect class="ic-logo-accent" width="100" height="100" fill="#0054fe"/><path class="ic-logo-base" fill="#00184d" d="M50 0A17.5 17.5 0 0 1 56.006 3.926L96.074 43.994A17.5 17.5 0 0 1 100 50L100 100L0 100L0 0Z"/></g></svg> InstantCanvas</div>
		<span class="rootpath" id="rootpath" title="The workspace folder this kernel serves and watches">…</span>
		<div class="view-toggle" id="viewToggle" hidden role="group" aria-label="Canvas view">
			<button class="vt-btn active" id="viewDeck" title="Document view (prints 1:1)" aria-label="Document view"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg></button>
			<button class="vt-btn" id="viewHtml" title="Continuous view" aria-label="Continuous view"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 6H3"/><path d="M15 12H3"/><path d="M17 18H3"/></svg></button>
		</div>
		<button class="tbtn primary" id="printBtn" hidden title="Print or save as PDF (⌘P) — the sheets are the pages"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg> Print</button>
		<button class="tbtn icon" id="themeBtn" title="Toggle theme"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v2"/><path d="M14.837 16.385a6 6 0 1 1-7.223-7.222c.624-.147.97.66.715 1.248a4 4 0 0 0 5.26 5.259c.589-.255 1.396.09 1.248.715"/><path d="M16 12a4 4 0 0 0-4-4"/><path d="m19 5-1.256 1.256"/><path d="M20 12h2"/></svg></button>
		<button class="tbtn icon" id="stopBtn" title="Stop kernel"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77.04"/></svg></button>
	</div>
	<div class="body">
		<aside class="sidebar">
			<div class="side-head">
				<span>WORKSPACE</span>
				<span class="side-actions">
					<button class="side-add" id="openSearch" aria-haspopup="dialog" title="Search canvases (⌘K)" aria-label="Search canvases"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
					<button class="side-add" id="openFolder" title="Open another workspace folder" aria-label="Open another workspace folder"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
				</span>
			</div>
			<div class="tree" id="tree"></div>
			<div class="side-foot">
				<div id="wsStats">— canvases</div>
				<div class="watch"><span class="pulse" id="pulse"></span> <span id="watchState">connecting</span> <span id="watchPath"></span></div>
				<div class="ver" title="InstantCanvas skill version">InstantCanvas v__IC_VERSION__</div>
			</div>
		</aside>
		<main class="main" id="main"></main>
	</div>
</div>

<!-- Frosted-glass canvas search. Mounted once, hidden until opened; the index is
     the workspace tree the sidebar already holds, so opening it fetches nothing. -->
<div class="csm" id="searchModal" hidden>
	<div class="csm-overlay" data-csm-close></div>
	<div class="csm-panel" role="dialog" aria-modal="true" aria-label="Search canvases">
		<div class="csm-head">
			<span class="csm-ic" aria-hidden="true"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
			<input class="csm-input" id="csmInput" type="text" placeholder="Search canvases…" autocomplete="off" autocapitalize="off" spellcheck="false"
				role="combobox" aria-expanded="true" aria-autocomplete="list" aria-controls="csmResults" aria-label="Search canvases">
			<button class="csm-esc" type="button" data-csm-close aria-label="Close search"><kbd aria-hidden="true">Esc</kbd></button>
		</div>
		<p class="csm-status" id="csmStatus"></p>
		<div class="csm-results" id="csmResults" role="listbox" aria-label="Search results" hidden></div>
		<div class="csm-foot" aria-hidden="true">
			<span><kbd>↑</kbd><kbd>↓</kbd> to navigate</span>
			<span><kbd>↵</kbd> to open</span>
			<span><kbd>esc</kbd> to close</span>
		</div>
	</div>
</div>

<script src="/assets/vendor/markdown-it.min.js?token=__IC_TOKEN__"></script>
<script src="/assets/vendor/highlight.min.js?token=__IC_TOKEN__"></script>
<script src="/assets/csp-shim.js?token=__IC_TOKEN__"></script>
<script src="/assets/vendor/plotly.min.js?token=__IC_TOKEN__"></script>
<script src="/assets/app.js?token=__IC_TOKEN__"></script>
</body>
</html>
