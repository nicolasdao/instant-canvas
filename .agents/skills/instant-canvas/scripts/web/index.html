<title>InstantCanvas</title>

<body>
<div class="app">
	<div class="topbar">
		<div class="brand"><span class="logo"></span> InstantCanvas</div>
		<span class="rootpath" id="rootpath">…</span>
		<div class="spacer"></div>
		<button class="tbtn" id="openFolder"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></svg> Open folder…</button>
		<button class="tbtn icon" id="themeBtn" title="Toggle theme"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v2"/><path d="M14.837 16.385a6 6 0 1 1-7.223-7.222c.624-.147.97.66.715 1.248a4 4 0 0 0 5.26 5.259c.589-.255 1.396.09 1.248.715"/><path d="M16 12a4 4 0 0 0-4-4"/><path d="m19 5-1.256 1.256"/><path d="M20 12h2"/></svg></button>
		<button class="tbtn icon" id="stopBtn" title="Stop kernel"><svg class="lucide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.77.04"/></svg></button>
	</div>
	<div class="body">
		<aside class="sidebar">
			<div class="side-head">WORKSPACE</div>
			<div class="tree" id="tree"></div>
			<div class="side-foot">
				<div id="wsStats">— canvases</div>
				<div class="watch"><span class="pulse" id="pulse"></span> <span id="watchState">connecting</span> <span id="watchPath"></span></div>
			</div>
		</aside>
		<main class="main" id="main"></main>
	</div>
</div>
