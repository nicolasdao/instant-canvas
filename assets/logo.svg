<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256" role="img" aria-label="InstantCanvas">
	<title>InstantCanvas</title>
	<!-- Geometry recovered from assets/logo.png: rounded square (r = 12% of the side),
	     folded corner running from the midpoint of the top edge to the midpoint of the
	     right edge, joined to the 45° diagonal by two symmetric r = 17.5 fillets. -->
	<style>
		.ic-logo-accent { fill: var(--logo-accent, #0054fe); }
		.ic-logo-base   { fill: var(--logo-base,   #00184d); }
	</style>
	<defs>
		<clipPath id="ic-logo-clip"><rect width="100" height="100" rx="12"/></clipPath>
	</defs>
	<g clip-path="url(#ic-logo-clip)">
		<rect class="ic-logo-accent" width="100" height="100" fill="#0054fe"/>
		<path class="ic-logo-base" fill="#00184d" d="M50 0
			A17.5 17.5 0 0 1 56.006 3.926
			L96.074 43.994
			A17.5 17.5 0 0 1 100 50
			L100 100 L0 100 L0 0 Z"/>
	</g>
</svg>
